name: job-application-tracker

services:
  postgres:
    image: postgres:16
    container_name: job-application-tracker-postgres
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
    ports:
      - "${DB_PORT:-55432}:5432"
    volumes:
      - job_application_tracker_postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: job-application-tracker-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - job_application_tracker_minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: job-application-tracker-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-job-application-tracker}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY}; do
        sleep 2;
      done;
      mc mb --ignore-existing local/$${MINIO_BUCKET};
      "
    restart: "no"

volumes:
  job_application_tracker_postgres_data:
  job_application_tracker_minio_data:
