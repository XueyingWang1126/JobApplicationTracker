server:
  port: ${APP_PORT:8080}

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:55432}/${DB_NAME:job_application_tracker}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  thymeleaf:
    enabled: true
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML5
    cache: false
  sql:
    init:
      mode: always

logging:
  level:
    com.baomidou.mybatisplus: INFO

minio:
  enabled: ${MINIO_ENABLED:true}
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  accessKey: ${MINIO_ACCESS_KEY}
  secretKey: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:job-application-tracker}
